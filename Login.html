<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Login to your Pregnancy Tracking System account.">
    <title>Login - Pregnancy Tracking System</title>
    <link rel="stylesheet" href="/src/css/styles.css">
</head>
<body class="bg-gray-100">
    <header class="bg-primary text-white text-center py-6 shadow-md">
        <h1 class="text-3xl font-bold">Login to Your Account</h1>
    </header>
    <main class="max-w-4xl mx-auto p-4">
        <form id="loginForm" class="bg-white p-6 rounded-lg shadow-md max-w-md mx-auto" aria-label="Login form">
            <div class="mb-4">
                <label for="username" class="block text-gray-700 font-bold mb-2">Username:</label>
                <input type="text" id="username" name="username" class="w-full p-3 border rounded-lg focus:outline-none focus:ring-2 focus:ring-primary" required aria-required="true">
            </div>
            <div class="mb-4">
                <label for="password" class="block text-gray-700 font-bold mb-2">Password:</label>
                <input type="password" id="password" name="password" class="w-full p-3 border rounded-lg focus:outline-none focus:ring-2 focus:ring-primary" required aria-required="true">
            </div>
            <button type="submit" class="w-full bg-primary text-white p-3 rounded-lg hover:bg-primary-hover transition-colors">Login</button>
        </form>
        <p class="text-center mt-4">Don't have an account? <a href="register.html" class="text-primary hover:underline">Register</a></p>
    </main>
    <footer class="bg-primary text-white text-center py-4 fixed bottom-0 w-full">
        <p>© 2025 Pregnancy Tracking System</p>
    </footer>
    <script src="/src/js/scripts.js" defer></script>
</body>
</html>
