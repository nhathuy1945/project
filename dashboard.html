<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="View your pregnancy tracking dashboard with milestones and health data.">
    <title>Dashboard - Pregnancy Tracking System</title>
    <link rel="stylesheet" href="/src/css/styles.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
</head>
<body class="bg-gray-100">
    <header class="bg-primary text-white text-center py-6 shadow-md">
        <h1 class="text-3xl font-bold">Dashboard</h1>
        <nav class="mt-4" aria-label="Dashboard navigation">
            <a href="/index.html" id="logoutLink" class="text-white mx-4 font-bold hover:underline">Logout</a>
        </nav>
    </header>
    <main class="max-w-4xl mx-auto p-4">
        <section id="guestDashboard" class="bg-white p-6 rounded-lg shadow-md mb-6" aria-labelledby="guest-heading">
            <h2 id="guest-heading" class="text-2xl text-primary mb-4">Your Pregnancy Journey</h2>
            <h3 class="text-lg font-bold mb-2">Notifications</h3>
            <ul id="notificationList" class="mb-4" aria-label="Notifications list"></ul>
            <h3 class="text-lg font-bold mb-2">Weight Tracking</h3>
            <canvas id="weightChart" class="max-w-full mx-auto mb-4" aria-label="Weight tracking chart"></canvas>
            <h3 class="text-lg font-bold mb-2">Milestones</h3>
            <ul id="milestoneList" class="mb-4" aria-label="Milestones list"></ul>
            <h3 class="text-lg font-bold mb-2">Add Health Label</h3>
            <form id="addLabelForm" class="max-w-md mx-auto" aria-label="Add health label form">
                <div class="mb-4">
                    <label for="labelName" class="block text-gray-700 font-bold mb-2">Health Label:</label>
                    <input type="text" id="labelName" name="labelName" placeholder="e.g., High Blood Pressure" class="w-full p-3 border rounded-lg focus:outline-none focus:ring-2 focus:ring-primary" required aria-required="true">
                </div>
                <button type="submit" class="w-full bg-primary text-white p-3 rounded-lg hover:bg-primary-hover transition-colors">Add Label</button>
            </form>
        </section>
        <section id="adminDashboard" class="bg-white p-6 rounded-lg shadow-md" style="display: none;" aria-labelledby="admin-heading">
            <h2 id="admin-heading" class="text-2xl text-primary mb-4">Admin Panel</h2>
            <h3 class="text-lg font-bold mb-2">Manage Users</h3>
            <table class="w-full border-collapse" aria-label="User management table">
                <thead>
                    <tr class="bg-primary text-white">
                        <th class="border p-3">Username</th>
                        <th class="border p-3">Email</th>
                        <th class="border p-3">Actions</th>
                    </tr>
                </thead>
<tbody id="userList"></tbody>
            </table>
        </section>
    </main>
    <script src="/src/js/scripts.js" defer></script>
</body>
</html>
