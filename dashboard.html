<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Dashboard to track your pregnancy progress.">
    <title>Dashboard - Pregnancy Tracking System</title>
    <link rel="stylesheet" href="../src/css/styles.css">
</head>
<body class="bg-gray-100">
<header class="bg-primary text-white text-center py-6 shadow-md">
    <h1 class="text-3xl font-bold">Pregnancy Dashboard</h1>
    <nav class="mt-4" aria-label="Dashboard navigation">
        <a href="index.html" class="text-white mx-4 font-bold hover:underline">Home</a>
        <button id="logoutBtn" class="text-white mx-4 font-bold hover:underline">Logout</button>
    </nav>
</header>
<main class="max-w-4xl mx-auto p-4">
    <section class="bg-white p-6 rounded-lg shadow-md mb-6" aria-labelledby="progress-heading">
        <h2 id="progress-heading" class="text-2xl text-primary mb-4">Your Pregnancy Progress</h2>
        <div id="pregnancyData" class="space-y-4"></div>
    </section>
    <section class="bg-white p-6 rounded-lg shadow-md" aria-labelledby="notifications-heading">
        <h2 id="notifications-heading" class="text-2xl text-primary mb-4">Notifications</h2>
        <div id="notifications" class="space-y-4"></div>
    </section>
</main>
<footer class="bg-primary text-white text-center py-4 fixed bottom-0 w-full">
    <p>© 2025 Pregnancy Tracking System</p>
</footer>
<script src="../src/js/scripts.js" defer></script>
</body>
</html>
