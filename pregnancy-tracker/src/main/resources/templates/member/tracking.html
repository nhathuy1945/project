<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tracking - Pregnancy Tracker</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet">
    <!-- Custom CSS -->
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body>
<header>
    <nav class="navbar navbar-expand-lg">
        <div class="container-fluid">
            <a class="navbar-brand" href="#">Pregnancy Tracker</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/stages}"><i class="fas fa-baby"></i> Stages</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/member/tracking}"><i class="fas fa-heartbeat"></i> My Tracking</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/member/tracking/update}"><i class="fas fa-edit"></i> Update Tracking</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/member/tracking/export}"><i class="fas fa-file-pdf"></i> Export to PDF</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/logout}"><i class="fas fa-sign-out-alt"></i> Logout</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>
</header>

<div class="container">
    <h2>My Pregnancy Tracking</h2>
    <div class="card mb-3">
        <div class="card-body">
            <p><strong><i class="fas fa-user"></i> Username:</strong> <span th:text="${tracking.username}"></span></p>
            <p><strong><i class="fas fa-map-marker-alt"></i> Location:</strong> <span th:text="${tracking.location}"></span></p>
            <p><strong><i class="fas fa-file"></i> File Path:</strong> <span th:text="${tracking.filePath}"></span></p>
        </div>
    </div>
    <div class="weather-info">
        <p><strong><i class="fas fa-cloud-sun"></i> Weather:</strong> <span th:text="${weather}"></span></p>
    </div>
    <div class="stage-list">
        <h3>Stages</h3>
        <div th:each="stage : ${stages}" class="stage-item">
            <p><strong>Week:</strong> <span th:text="${stage.week}"></span></p>
            <p><strong>Description:</strong> <span th:text="${stage.description}"></span></p>
        </div>
    </div>
</div>

<footer>
    <p>© 2025 Pregnancy Tracker. All rights reserved. | <a href="#">Contact Us</a> | <a href="#">Privacy Policy</a></p>
</footer>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
