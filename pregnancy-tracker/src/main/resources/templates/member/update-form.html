<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Update Tracking - Pregnancy Tracker</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet">
    <!-- Custom CSS -->
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body>
<header>
    <nav class="navbar navbar-expand-lg">
        <div class="container-fluid">
            <a class="navbar-brand" href="#">Pregnancy Tracker</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/stages}"><i class="fas fa-baby"></i> Stages</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/member/tracking}"><i class="fas fa-heartbeat"></i> My Tracking</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/member/tracking/update}"><i class="fas fa-edit"></i> Update Tracking</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/member/tracking/export}"><i class="fas fa-file-pdf"></i> Export to PDF</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/logout}"><i class="fas fa-sign-out-alt"></i> Logout</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>
</header>

<div class="container">
    <h2>Update Your Tracking</h2>
    <form th:action="@{/member/tracking/update}" th:object="${tracking}" method="post" enctype="multipart/form-data">
        <div class="form-group mb-3">
            <label for="location">Location</label>
            <input type="text" class="form-control" id="location" th:field="*{location}" placeholder="Enter your location" required>
        </div>
        <div class="form-group mb-3">
            <label for="file">Upload File</label>
            <input type="file" class="form-control" id="file" name="file">
        </div>
        <button type="submit" class="btn btn-primary w-100">Update</button>
    </form>
</div>

<footer>
    <p>© 2025 Pregnancy Tracker. All rights reserved. | <a href="#">Contact Us</a> | <a href="#">Privacy Policy</a></p>
</footer>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
