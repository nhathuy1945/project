<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Register for a Pregnancy Tracking System account.">
    <title>Register - Pregnancy Tracking System</title>
    <link rel="stylesheet" href="../src/css/styles.css">
</head>
<body class="bg-gray-100">
<header class="bg-primary text-white text-center py-6 shadow-md">
    <h1 class="text-3xl font-bold">Register for Pregnancy Tracking System</h1>
</header>
<main class="max-w-4xl mx-auto p-4">
    <form id="registerForm" class="bg-white p-6 rounded-lg shadow-md max-w-md mx-auto" aria-label="Registration form">
        <div class="mb-4">
            <label for="username" class="block text-gray-700 font-bold mb-2">Username:</label>
            <input type="text" id="username" name="username" class="w-full p-3 border rounded-lg focus:outline-none focus:ring-2 focus:ring-primary" required aria-required="true">
        </div>
        <div class="mb-4">
            <label for="password" class="block text-gray-700 font-bold mb-2">Password:</label>
            <input type="password" id="password" name="password" class="w-full p-3 border rounded-lg focus:outline-none focus:ring-2 focus:ring-primary" required aria-required="true">
        </div>
        <div class="mb-4">
            <label for="email" class="block text-gray-700 font-bold mb-2">Email:</label>
            <input type="email" id="email" name="email" class="w-full p-3 border rounded-lg focus:outline-none focus:ring-2 focus:ring-primary" required aria-required="true">
        </div>
        <div class="mb-4">
            <label for="role" class="block text-gray-700 font-bold mb-2">Role:</label>
            <select id="role" name="role" class="w-full p-3 border rounded-lg focus:outline-none focus:ring-2 focus:ring-primary" required aria-required="true">
                <option value="Guest">Guest</option>
                <option value="Admin">Admin</option>
            </select>
        </div>
        <button type="submit" class="w-full bg-primary text-white p-3 rounded-lg hover:bg-primary-hover transition-colors">Register</button>
    </form>
    <p class="text-center mt-4">Already have an account? <a href="login.html" class="text-primary hover:underline">Login</a></p>
</main>
<footer class="bg-primary text-white text-center py-4 fixed bottom-0 w-full">
    <p>© 2025 Pregnancy Tracking System</p>
</footer>
<script src="../src/js/scripts.js" defer></script>
</body>
</html>
